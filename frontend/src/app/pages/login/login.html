<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="logo">📦</div>
      <h1>Bodega Gestión</h1>
      <p>{{ isLoginMode() ? 'Accede a tu cuenta' : 'Regístrate como Cliente' }}</p>
    </div>

    @if (isLoginMode()) {
      <form (ngSubmit)="onLogin()" class="login-form">
        <div class="form-group">
          <label>Correo Electrónico</label>
          <input type="email" [(ngModel)]="loginEmail" name="email" placeholder="nombre@bodega.com" required>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" [(ngModel)]="loginPassword" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary btn-block">Iniciar Sesión</button>
      </form>
      <div class="login-footer">
        <span>¿Eres un cliente nuevo?</span>
        <button (click)="toggleMode()" class="btn-link">Crea tu cuenta aquí</button>
      </div>
    } @else {
      <form (ngSubmit)="onRegister()" class="login-form">
        <div class="form-row">
          <div class="form-group">
            <label>Nombres</label>
            <input type="text" [(ngModel)]="regCliente.nombres" name="nombres" required>
          </div>
          <div class="form-group">
            <label>Apellidos</label>
            <input type="text" [(ngModel)]="regCliente.apellidos" name="apellidos" required>
          </div>
        </div>
        <div class="form-group">
          <label>Correo Electrónico</label>
          <input type="email" [(ngModel)]="regCliente.email" name="reg_email" required>
        </div>
        <div class="form-group">
          <label>Dirección de Entrega</label>
          <input type="text" [(ngModel)]="regCliente.direccion" name="direccion">
        </div>
        <button type="submit" class="btn-primary btn-block">Registrarse como Cliente</button>
      </form>
      <div class="login-footer">
        <span>¿Ya tienes cuenta?</span>
        <button (click)="toggleMode()" class="btn-link">Inicia sesión aquí</button>
      </div>
    }
  </div>
</div>
